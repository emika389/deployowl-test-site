name: DeployOwl Pages - domainnew
on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!.github/workflows/deployowl-pages-*.yml'
      - '.github/workflows/deployowl-pages-domainnew.yml'
  workflow_dispatch:

concurrency:
  group: deployowl-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Inject Environment Variables
        run: |
          node -e "
            const https = require('https');
            const fs = require('fs');
            const url = 'https://pagers.deployowl.com/api/pages/config/env?token=' + process.env.DEPLOYOWL_PROJECT_TOKEN;
            const client = url.startsWith('https') ? https : require('http');
            client.get(url, (res) => {
              let data = '';
              res.on('data', d => data += d);
              res.on('end', () => {
                if (res.statusCode !== 200) {
                  console.error('Failed to fetch env:', data);
                  process.exit(1);
                }
                const response = JSON.parse(data);
                const { vars = {}, secrets = {} } = response;
                
                for (const [k, v] of Object.entries(secrets)) {
                  console.log('::add-mask::' + v);
                }

                const GITHUB_ENV = process.env.GITHUB_ENV;
                const writeEnv = (key, value) => {
                  const delimiter = 'EOF_' + require('crypto').randomBytes(8).toString('hex');
                  fs.appendFileSync(GITHUB_ENV, \`\${key}<<\${delimiter}\\n\`);
                  fs.appendFileSync(GITHUB_ENV, \`\${value}\\n\`);
                  fs.appendFileSync(GITHUB_ENV, \`\${delimiter}\\n\`);
                };

                for (const [k, v] of Object.entries(vars)) {
                  writeEnv(k, v);
                }
                for (const [k, v] of Object.entries(secrets)) {
                  writeEnv(k, v);
                }

                console.log('Successfully injected', Object.keys(vars).length + Object.keys(secrets).length, 'environment variables.');
              });
            }).on('error', e => {
              console.error(e);
              process.exit(1);
            });
          "
        env:
          DEPLOYOWL_PROJECT_TOKEN: ${{ secrets.DEPLOYOWL_PAGE_TOKEN_DOMAINNEW }}

      - name: Install Dependencies & Build
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          else
            npm install
          fi
          npm run build --if-present

      - name: Run DeployOwl Pages Deployer
        run: |
          curl -sSf "https://pagers.deployowl.com/api/pages/deploy-script" -o deploy-script.js
          node deploy-script.js
        env:
          DEPLOYOWL_PROJECT_TOKEN: ${{ secrets.DEPLOYOWL_PAGE_TOKEN_DOMAINNEW }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_BRANCH: ${{ github.ref_name }}