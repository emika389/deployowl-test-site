name: DeployOwl Validation\non:\n  repository_dispatch:\n    types: [deployowl-validation]\n  workflow_dispatch:\n\njobs:\n  build-test:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n        with:\n          ref: ${{ github.event.client_payload.ref || github.ref }}\n          fetch-depth: 0\n      - name: Setup Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '20'\n          cache: 'npm'\n      - name: Install dependencies\n        run: npm ci\n      - name: Build\n        run: npm run build\n      - name: Test\n        run: npm test\n